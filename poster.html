<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My PM — 포스터</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }

    .card {
      width: 760px;
      background: linear-gradient(150deg, #0d0d1a 0%, #111827 55%, #0d1b2a 100%);
      border-radius: 28px;
      padding: 64px 60px 52px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* 배경 글로우 */
    .glow-top {
      position: absolute;
      top: -160px; right: -160px;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .glow-bottom {
      position: absolute;
      bottom: -140px; left: -120px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    /* 헤더 */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 44px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; color: white; }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.5px;
    }
    .badge {
      margin-left: auto;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      font-size: 11px;
      font-weight: 500;
      color: #a5b4fc;
      letter-spacing: 0.3px;
    }

    /* 메인 타이틀 */
    .title {
      font-size: 44px;
      font-weight: 900;
      color: #f8fafc;
      line-height: 1.2;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
    }
    .title span {
      background: linear-gradient(90deg, #818cf8, #a78bfa, #6ee7b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 52px;
      font-weight: 400;
    }

    /* 구분선 */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin-bottom: 40px;
    }

    /* 기능 그리드 */
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 52px;
    }
    .feature-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 20px 22px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: background 0.2s;
    }
    .feature-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .feature-icon svg { width: 18px; height: 18px; }
    .icon-blue   { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .icon-green  { background: rgba(16,185,129,0.15); color: #34d399; }
    .icon-violet { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .icon-orange { background: rgba(249,115,22,0.15); color: #fb923c; }

    .feature-text .name {
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 4px;
    }
    .feature-text .desc {
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }

    /* 하단 통계 */
    .stats {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 40px;
    }
    .stat-item {
      flex: 1;
      padding: 18px 0;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-size: 22px;
      font-weight: 900;
      color: #f1f5f9;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 11px;
      color: #475569;
      font-weight: 500;
    }

    /* 푸터 */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .url {
      font-size: 12px;
      color: #334155;
      font-weight: 500;
    }
    .cta {
      padding: 10px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      font-size: 13px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>

    <!-- 헤더 -->
    <div class="header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:white">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <span class="logo-text">My PM</span>
      <span class="badge">Personal Project Manager</span>
    </div>

    <!-- 타이틀 -->
    <div class="title">일 잘하는 사람들의<br /><span>개인 생산성 도구</span></div>
    <div class="subtitle">
      할 일, 일정, 연락처, 리포트까지 —<br />
      흩어진 업무를 단 하나의 앱에서 관리하세요.
    </div>

    <div class="divider"></div>

    <!-- 기능 -->
    <div class="features">
      <div class="feature-card">
        <div class="feature-icon icon-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </div>
        <div class="feature-text">
          <div class="name">칸반 보드</div>
          <div class="desc">드래그 앤 드롭으로<br />프로젝트 진행을 시각화</div>
        </div>
      </div>

      <div class="feature-card">
        <div class="feature-icon icon-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="feature-text">
          <div class="name">캘린더</div>
          <div class="desc">마감일을 월별·주별로<br />한눈에 확인하고 관리</div>
        </div>
      </div>

      <div class="feature-card">
        <div class="feature-icon icon-violet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="feature-text">
          <div class="name">CRM</div>
          <div class="desc">연락처·회사·활동 이력을<br />체계적으로 기록·관리</div>
        </div>
      </div>

      <div class="feature-card">
        <div class="feature-icon icon-orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </div>
        <div class="feature-text">
          <div class="name">주간 리포트</div>
          <div class="desc">생산성 패턴을 자동 분석해<br />인사이트로 제공</div>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats">
      <div class="stat-item">
        <div class="stat-num">4+</div>
        <div class="stat-label">핵심 기능</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">다크모드</div>
        <div class="stat-label">지원</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">무료</div>
        <div class="stat-label">사용 가능</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">웹 기반</div>
        <div class="stat-label">설치 불필요</div>
      </div>
    </div>

    <!-- 푸터 -->
    <div class="footer">
      <div class="url">pjt-manager-one.vercel.app</div>
      <div class="cta">지금 시작하기 →</div>
    </div>
  </div>
</body>
</html>
